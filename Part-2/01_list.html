<!--unordered list: no ordered wise, shows in bullet points
ordered list: order wise , shows numbers -->

<ul> <!--unordered list--> 
    <li>Bread</li>  <!--list item-->
    <li>Butter</li>
    <li>Jam</li>
    <li>Samosa</li>
</ul>

<ol type="A"> <!--ordered list if type="A" then it shows alphabets-->
    <li>bread</li>
    <li>jam</li>
    <li>butter</li>
</ol>
