<!--br tag-->
<!--used to add next line (line breaks) to your page-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Twinkle Twinkle Little star how i wonder what you are</p>
    <p>Twinkle Twinkle <br> Little star <br> how i wonder <br> what you are</p>
    <!--br tag is used as break tag-->
</body>
</html>

<!--Bold, italic and underline tags-->

<!--Italic : <i></i>-->
<!--Underline : <u></u>-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p><b>Twinkle Twinkle</b> <br> <i>Litle star</i> <br>
         <u>how i wonder</u> <br> what you are</p>
    <!--br, b, i ,u tag is used as break tag-->
</body>
</html>
