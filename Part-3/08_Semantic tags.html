<!--semantic tags-->

<!--1.<header></header> -- comes in heading
    2.<main></main>     -- comes in main content
    3.<footer></footer>  -- comes in last part of the page i.e. in footer
    4.<nav></nav         -- use to navigate-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html level-2</title>
</head>
<body>
    <header>apna college <a href="www.apna college.in">go to main page</a></header>
    <nav>
        <ul>
            <li><a href="like">about us</a></li>
            <li><a href="you">contact us</a></li>
        </ul>
    </nav>
    <main>this is my content</main>
    <footer>made with &hearts;</footer>
</body>
</html>

<!-- <article></article> uses to define independent content on web page
    <section></section> uses to group related content
    <aside></aside> uses to relate link or content   -->
