<!--HTML Entities
1. An HTML entity is a piece of text("string") that begins with an
ampersand(&) and ends with a semicolon ; .
EX: &nbsp; - non breaking space , &lt; - lesser than symbol
    &gt; - greater than symbol , 

    to print & - &amp;
    to print " - &quot;
    
2. used to dispaly reserved characters(which would otherwise be interpreted as HTML code), 
   and invisible characters(like non-breaking spaces).
   
3. can also use in place of characters that arer difficult to type with
   a standard keyboard.
   
4. browser interprets them & renders correct character.   -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>this is power &bigstar;</h1>
    <p>a &lt; b</p>
    <p>a &gt; b</p>
    <p>a &amp; b</p>
    <p>a &quot; b &quot;</p>
</body>
</html>
