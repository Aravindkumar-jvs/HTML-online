<!-- INPUT element
 ** used to create multiple form controls..
 ** there are multiple types of inputs that can be created
    using type attribute...
    
    <type> single tag , non container tag -->

<!--Popular input tag are , type attributes :
    <input type="text"> 
    <input type="password">
    <input type="number"> 
    <input type="time">
    <input type="color"> -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/action">
        <h2>Username</h2>
        <input type="text">
        <br>
        <h2>Password</h2>
        <input type="password">
        <br>
        <h2>Number</h2>
        <input type="number">
        <br>
        <h2>Time and date</h2>
        <input type="datetime-local">
        <br>
        <h2>Color</h2>
        <input type="color">
        <br>
        Range
        <input type="range">
        <br>
    </form>
</body>
</html>
