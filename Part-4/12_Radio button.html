<!--radio button is to choose only one option which is 
    mandatory to select the option in the webpage
    
    <input type="radio" name="fruit id="apple" value="apple"
    <label for="apple">Apple</label>  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/server">
        <div>
            <input type="radio" name="fruit" id="apple" value="apple">
            <!--value is used to get the selected radio button data
                name=value i.e fruit=value -->
            <label for="apple">Apple</label> <br>
            <input type="radio" name="fruit" id="mango" value="mango">
            <label for="mango">Mango</label> <br>
            <input type="radio" name="fruit" id="bannana" value="bannana">
            <label for="bannana">Bannana</label> <br>
        </div>
        <hr>
        <div>
            choose your subjects: <!--value for checkbox list-->
            <input type="checkbox" id="math" name="subject" value="math">
            <label for="math">Math</label>
            <input type="checkbox" id="science" name="subject" value="sci">
            <label for="science">Science</label>
            <input type="checkbox" id="english" name="subject" value="eng">
            <label for="english">English</label>
        </div>
        <button>submit</button>
    </form>
</body>
</html>

<!--it is possible to select only one option ,
    grouping is possible becoz of keeping same name attribute -->
