<!--tables in HTML
<thead> : to wrap table header
<tbody> : to wrap table body
<tfoot> : to wrap table footer like sum or avg in the table last..-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="black"> <!--table border colour-->
        <caption>food menu</caption> <!--table title-->

        <thead> <!--table header-->
             <tr> <!--table row-->
            <th>item</th>  <!-- table header -->
            <th>price</th>
        </tr>
        </thead>

       <tbody> <!--table body-->
         <tr>
            <td>frooti</td> <!--table data -->
            <td>10</td>
        </tr>
        <tr>
            <td>samosa</td>
            <td>20</td>
        </tr>
        <tr>
            <td>chips</td>
            <td>30</td>
        </tr>

       </tbody>
       
    </table>
</body>
</html>
