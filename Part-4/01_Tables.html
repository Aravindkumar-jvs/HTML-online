<!--Tables - are used to represent real life table data.
combination of rows and coloumns -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="2">
        <caption>Food Menu</caption> <!--table title or Caption-->
        <tr> <!--used to dispaly table row-->
            <th>header1</th>
            <th>header2</th> <!--used to dispaly table header-->
        </tr>
        <tr>
            <td>data1</td> <!--used to display table data-->
            <td>data2</td>
        </tr>
    </table>
</body>
</html>
