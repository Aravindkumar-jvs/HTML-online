<!--used to create cells which spans over multiple rows or columns-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="black">
        <caption>food menu</caption>
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>frooti</td>
                <td>10</td>
                <td>0.14</td>
            </tr>
            <tr>
                <td>samosa</td>
                <td>20</td>
                <td>0.17</td>
            </tr>
            <tr>
                <td>Chips</td>
                <td>30</td>
                <td>0.20</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
