<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/server">
        <label for="vol">Select your volume</label>
        <input
         type="range"
         id="vol"
         min="0" max="100" 
         name="vol" 
         step="10"
         value="70"><!--step is used to increase vol by step number,
         ****value is used to default set the volume-->
        <div>
            <button>submit</button>
        </div>
    </form>
</body>
</html>
